workflows:
  ios-testflight:
    name: GoalShare iOS TestFlight
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    environment:
      flutter: stable
      # Pin to Xcode 16 (iOS 18 SDK), NOT latest (Xcode 26 / iOS 26 SDK). Building
      # against the iOS 26 SDK forces the new UIScene/implicit-engine launch path,
      # which crashes on ProMotion devices (Flutter #183900). Built with the iOS 18
      # SDK, iOS 26 runs the app in proven legacy lifecycle and avoids that crash.
      xcode: 16.4
      cocoapods: default
      # App Store Connect API key integration (name as configured in Codemagic
      # user settings; key id 896WKD2KUW). Required by `auth: integration`
      # publishing AND by `app-store-connect fetch-signing-files` for signing.
      integrations:
        app_store_connect: GoalShare
      vars:
        BUNDLE_ID: "com.goal.share"
        # Numeric App Store Connect Apple ID for GoalShare. Used by the
        # auto-increment step to look up the latest TestFlight build number.
        # Not a secret (it's the app's public store identifier), so plain text.
        APP_STORE_APPLE_ID: "6779742874"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.goal.share
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.goal.share \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Run unit & widget tests
        script: flutter test --reporter=expanded
      - name: Set unique build number (timestamp — collision-proof)
        script: |
          # Build number = current Unix timestamp (seconds since 1970).
          #
          # Every previous approach failed because it relied on a value that can
          # REPEAT:
          #   * App Store Connect "latest build number" lookup lags several
          #     minutes while a build processes, so back-to-back builds re-used
          #     the same number.
          #   * Codemagic's $BUILD_NUMBER did not reliably increment in this
          #     setup, so retries landed on the same offset (e.g. 101) and the
          #     second upload was rejected: "attribute ... already been used".
          #
          # A Unix timestamp strictly increases and never repeats — no lookup, no
          # counter, no race. It is always ~1.78 billion, far above the manual
          # builds (31/32) already on TestFlight, and well under Apple's
          # CFBundleVersion ceiling. Build numbers only need to increase; gaps
          # are fine.
          APP_BUILD_NUMBER=$(date +%s)
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> "$CM_ENV"
          echo "Building with build number $APP_BUILD_NUMBER (Unix timestamp)"
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number="$APP_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Upload-only. The IPA upload (the "Publishing" step) is what makes the
        # build available to internal TestFlight testers — they automatically
        # receive every processed build, so no submit/beta-group action is
        # needed. We intentionally OMIT submit_to_testflight and beta_groups:
        # that post-upload "App Store distribution" action kept failing (red)
        # while the upload itself always succeeded. Upload-only = fully green.
