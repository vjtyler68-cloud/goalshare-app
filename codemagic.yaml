workflows:
  ios-testflight:
    name: GoalShare iOS TestFlight
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.goal.share"
        APP_STORE_APPLE_ID: Encrypted()
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.goal.share
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.goal.share \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Upload the build to App Store Connect. Internal testers (e.g. the
        # "Testing 001" group) automatically receive every processed build, so
        # we do NOT assign beta_groups here — targeting a non-assignable group
        # ("App Store Connect Users") was failing the App Store distribution
        # step on builds 14 & 15 while the upload itself always succeeded.
        submit_to_testflight: true
