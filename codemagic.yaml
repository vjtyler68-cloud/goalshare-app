workflows:
  ios-testflight:
    name: GoalShare iOS TestFlight
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    environment:
      flutter: stable
      # Pin to Xcode 16 (iOS 18 SDK), NOT latest (Xcode 26 / iOS 26 SDK). Building
      # against the iOS 26 SDK forces the new UIScene/implicit-engine launch path,
      # which crashes on ProMotion devices (Flutter #183900). Built with the iOS 18
      # SDK, iOS 26 runs the app in proven legacy lifecycle and avoids that crash.
      xcode: 16.4
      cocoapods: default
      vars:
        BUNDLE_ID: "com.goal.share"
        APP_STORE_APPLE_ID: Encrypted()
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.goal.share
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.goal.share \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Auto-increment build number (prevents "already been used" upload errors)
        script: |
          # Every push to main triggers a build; without a unique build number the
          # App Store upload fails with "attribute ... already been used". Fetch the
          # highest build number already on App Store Connect and add 1 so each build
          # is unique no matter how often the pipeline runs. Safe fallback: if the
          # lookup is unavailable, use the pubspec build number.
          LATEST=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)
          if echo "$LATEST" | grep -qE '^[0-9]+$'; then
            echo "BUILD_NUMBER=$(($LATEST + 1))" >> "$CM_ENV"
            echo "App Store latest build = $LATEST -> building $(($LATEST + 1))"
          else
            echo "Latest build number unavailable ('$LATEST') — using pubspec build number."
          fi
      - name: Build iOS IPA
        script: |
          if [ -n "$BUILD_NUMBER" ]; then
            flutter build ipa --release \
              --build-number="$BUILD_NUMBER" \
              --export-options-plist=/Users/builder/export_options.plist
          else
            flutter build ipa --release \
              --export-options-plist=/Users/builder/export_options.plist
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Upload-only. The IPA upload (the "Publishing" step) is what makes the
        # build available to internal TestFlight testers — they automatically
        # receive every processed build, so no submit/beta-group action is
        # needed. We intentionally OMIT submit_to_testflight and beta_groups:
        # that post-upload "App Store distribution" action kept failing (red)
        # while the upload itself always succeeded. Upload-only = fully green.
