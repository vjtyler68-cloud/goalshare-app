name: spanx
description: "GoalShare - set goals, build habits, and track your progress."
publish_to: 'none'
version: 1.4.0+42

# last updated on 2026-Jun-16
# version: 1.4.0+30

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  dotted_border: ^3.1.0
  http: ^1.2.0
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.0
  get: ^4.7.2
  google_fonts: ^8.0.0
  image_picker: ^1.2.0
  path: ^1.9.1
  pinput: ^5.0.1
  video_player: ^2.10.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  loading_animation_widget: ^1.3.0
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  syncfusion_flutter_charts: ^31.1.17
  url_launcher: ^6.3.2
  fluttertoast: ^8.2.12
  internet_connection_checker: ^3.0.1
  flutter_easyloading: ^3.0.5
  logger: ^2.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.5
  youtube_player_iframe: ^5.1.0
  in_app_purchase: ^3.2.3
  lottie: ^3.3.2
  # Firebase — powers real-time chat (see docs/FIREBASE_SETUP.md)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  # CLI-only tooling (run once via `dart run`), moved out of runtime
  # dependencies so they are not bundled into the shipped app.
  rename_app: ^1.6.5
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash_icon.png"
  remove_alpha_ios: true
  background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/jsons/
    - assets/fonts/
